# StarryOS vs Linux syscall 兼容矩阵（骨架）
# 用途：按 syscall 记录语义类别、StarryOS 状态与已知差异；随审计逐行填充。
# 与 catalog 关系：catalog 偏「工程元数据」，本文件偏「行为对齐结论」。

schema_version: 1
# parity 取值建议：partial | aligned | divergent | not_applicable（未接固定 oracle / 不适用单行 CASE）
# planned_contract_probe：仅脚手架名；parity 为 not_applicable 时不校验 contract 文件。
#   落地 contract/*.c + expected 后把 parity 升为 partial 并设置 contract_probe（或沿用同名）。
#   批次与命名见 docs/starryos-syscall-probe-rollout.yaml（python3 scripts/gen_probe_rollout.py 生成）。
# divergent 行必须带 tracking_issue: https://...（由 scripts/check_compat_matrix.py 校验）
# 登记说明见 docs/starryos-syscall-compat-divergence.md
# 全手写 contract：建议在 SMP2（-smp 2）下再跑串口 CASE 与 oracle 对齐：
#   test-suit/starryos/scripts/run-smp2-guest-matrix.sh
# 说明见 docs/starryos-syscall-smp-notes.md
linux_profile:
  arch: riscv64
  libc: musl
  # 轨 A（快）：linux-user oracle，默认 verify / 日常迭代
  oracle_runner_fast: qemu-riscv64
  # 轨 B（准）：system guest 内真实内核；锚点见 docs/starryos-linux-guest-oracle-pin.md
  oracle_runner_guest: qemu-system-riscv64
  guest_linux_anchor:
    distro: Alpine Linux
    distro_version: "3.23.3"
    kernel_lineage: Linux 6.18 LTS
    expected_track_dir: guest-alpine323
  # 轨 B 金线目录：test-suit/starryos/probes/expected/guest-alpine323/*.line
  # 一键冒烟+比对：scripts/verify_linux_guest_oracle.sh -i /path/to/Image
  # 批量重写金线：STARRY_LINUX_GUEST_IMAGE=... CC=riscv64-...-gcc scripts/refresh_guest_oracle_expected.sh
  # CI 参考：.github/workflows/starryos-linux-guest-oracle.yml（默认不跑全量 guest verify，需自备 Image）
  # 兼容旧字段：与 oracle_runner_fast 同义
  oracle_runner: qemu-riscv64

entries:
- syscall: write
  contract_probe: write_stdout
  parity: partial
  notes:
  - 零长度 write stdout 已接 oracle + QEMU 用例
- syscall: io_zero_rw
  contract_probe: io_zero_rw
  parity: partial
  notes:
  - read stdin count=0 + write stdout len=0；仅 .cases，无 .line
- syscall: close
  contract_probe: close_badfd
  parity: partial
  notes:
  - 无效 fd -> EBADF 已接 oracle 期望行
- syscall: read
  contract_probe: read_stdin_zero
  parity: partial
  notes:
  - stdin read count=0 -> ret=0（与 write 零长度对称）
- syscall: dup
  contract_probe: dup_badfd
  parity: partial
  notes:
  - dup 非法 fd -> EBADF（errno=9）
- syscall: fcntl
  contract_probe: fcntl_badfd
  parity: partial
  notes:
  - F_GETFD on 非法 fd -> EBADF
- syscall: ioctl
  contract_probe: ioctl_badfd
  parity: partial
  notes:
  - 非法 fd + FIONREAD -> EBADF
- syscall: pipe2
  contract_probe: pipe2_nullfd
  parity: partial
  notes:
  - pipefd=NULL -> EFAULT（errno=14）
- syscall: clock_gettime
  contract_probe: clock_gettime_null_ts
  parity: partial
  notes:
  - timespec=NULL -> EFAULT（errno=14）
- syscall: lseek
  contract_probe: lseek_badfd
  parity: partial
  notes:
  - 非法 fd + SEEK_SET -> EBADF
- syscall: openat
  contract_probe: openat_badfd
  parity: partial
  notes:
  - 非法 dirfd -> EBADF（openat_badfd）
  - 不存在绝对路径 -> ENOENT（openat_enoent）
- syscall: execve
  contract_probe: execve_enoent
  parity: partial
  notes:
  - 不存在路径 -> ENOENT（errno=2）
- syscall: wait4
  contract_probe: wait4_echild
  parity: partial
  notes:
  - 非本子进程 pid -> ECHILD（errno=10）
- syscall: futex
  contract_probe: futex_wake_nop
  parity: partial
  notes:
  - FUTEX_WAKE 无等待者 -> ret=0（非阻塞最小用例）；wait/竞态仍须单独矩阵
  - SMP2 guest：run-smp2-guest-matrix.sh
- syscall: ppoll
  contract_probe: ppoll_zero_fds
  parity: partial
  notes:
  - nfds=0 + 零超时 -> 立即返回；阻塞/信号掩码组合仍须扩展用例
  - SMP2 guest：run-smp2-guest-matrix.sh
