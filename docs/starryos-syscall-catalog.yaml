# StarryOS syscall catalog (seed). Run:
#   python3 scripts/extract_starry_syscalls.py --out-json docs/starryos-syscall-dispatch.json
#   python3 scripts/extract_starry_syscalls.py --check-catalog docs/starryos-syscall-catalog.yaml
# Dispatch path is shared by all syscalls below.
dispatch_path: os/StarryOS/kernel/src/syscall/mod.rs

syscalls:
- syscall: openat
  domain: fs
  dispatch_path: os/StarryOS/kernel/src/syscall/mod.rs
  impl_path: os/StarryOS/kernel/src/syscall/fs/
  status: partial
  semantic_class: local_io
  boundary_profiles:
  - path_lookup
  - fd_basic
  - bad_dirfd
  - enoent_abs_path
  core_modes:
  - smp1
  linux_refs:
  - man 2 openat
  tests:
  - test-suit/starryos/probes/contract/openat_badfd.c
  - test-suit/starryos/probes/contract/openat_enoent.c
  risk_tags:
  - errno_mismatch
  - user_buffer
  generator_hints:
    template: contract_errno
